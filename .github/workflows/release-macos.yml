name: Signed macOS release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: volyx-lens-macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    environment: macos-release
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm ci
      - run: npm test
      - run: npm run check:syntax
      - run: npm run security:secrets
      - run: npm audit --audit-level=low
      - name: Prepare optional App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          fi
      - name: Build, sign, and notarize
        run: |
          node scripts/check-macos-release.js --require-credentials
          npx electron-builder --mac zip --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - run: npm run verify:vision-ocr-package
      - name: Verify signature, notarization, and architecture
        run: |
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name "*-${{ matrix.arch }}.zip" -print -quit)"
          test -n "$ZIP_PATH"
          VERIFY_DIR="$(mktemp -d)"
          ditto -x -k "$ZIP_PATH" "$VERIFY_DIR"
          APP_PATH="$(find "$VERIFY_DIR" -type d -name 'Volyx Lens.app' -print -quit)"
          test -n "$APP_PATH"
          python3 - "$APP_PATH/Contents/MacOS/Volyx Lens" <<'PY'
          import subprocess, sys
          result = subprocess.run([sys.argv[1], '--smoke-test'], stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=15)
          print(result.stdout)
          if result.returncode != 0 or 'VOLYX_LENS_RENDERER_READY' not in result.stdout:
              raise SystemExit('Signed application did not report renderer readiness.')
          PY
          test "$(defaults read "$APP_PATH/Contents/Info" CFBundleIdentifier)" = "ai.volyx.lens"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -q "Authority=Developer ID Application"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --verbose --type exec "$APP_PATH"
          file "$APP_PATH/Contents/MacOS/Volyx Lens" | grep -q "${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}"
      - name: Create checksum and SBOM
        run: |
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name "*-${{ matrix.arch }}.zip" -print -quit)"
          ZIP_NAME="$(basename "$ZIP_PATH")"
          (cd dist && shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256")
          npm sbom --sbom-format cyclonedx > "dist/volyx-lens-${{ matrix.arch }}.cdx.json"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/*-${{ matrix.arch }}.zip
      - name: Attest signed archive SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/*-${{ matrix.arch }}.zip
          sbom-path: dist/volyx-lens-${{ matrix.arch }}.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: volyx-lens-macos-${{ matrix.arch }}
          path: |
            dist/*-${{ matrix.arch }}.zip
            dist/*-${{ matrix.arch }}.zip.sha256
            dist/volyx-lens-${{ matrix.arch }}.cdx.json
          if-no-files-found: error

  publish-release:
    needs: build-sign-notarize
    runs-on: ubuntu-latest
    environment: macos-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: volyx-lens-macos-*
          path: dist
          merge-multiple: true
      - name: Publish immutable GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Volyx Lens $GITHUB_REF_NAME" \
            --generate-notes
